name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Generate Prisma Client
      run: npx prisma generate
      
    - name: Run linter
      run: npm run lint
      
    - name: Run typecheck
      run: npx tsc --noEmit
      
    - name: Build project
      run: npm run build
      env:
        # Provide dummy env vars needed for build if necessary
        DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
        JWT_SECRET: "dummy-secret-for-build-only"
